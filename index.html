<!DOCTYPE html>
<html>
<head>
<title>Stylish Snake Game</title>

<style>

/* Background */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#141e30,#243b55);
    font-family: Arial;
}

/* Game Card */
.container{
    background: rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 25px cyan;
    text-align:center;
}

/* Title */ 
h1{
    color:cyan;
    text-shadow:0 0 15px cyan;
}

/* Score */
.score{
    color:white;
    font-size:22px;
    margin-bottom:10px;
}

/* Canvas */
canvas{
    background-color:black;
    border-radius:10px;
    box-shadow:0 0 20px lime;
}

/* Button */
button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,cyan,lime);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px lime;
}

/* Game Over Screen */
.gameover{
    color:red;
    font-size:24px;
    margin-top:10px;
    display:none;
    text-shadow:0 0 10px red;
}

</style>
</head>

<body>

<div class="container">

<h1>🐍 Snake Game</h1>

<div class="score">
Score: <span id="score">0</span>
</div>

<canvas id="canvas" width="400" height="400"></canvas>

<div class="gameover" id="gameover">
Game Over
</div>

<button onclick="restart()">Restart</button>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const grid = 20;

let snake;
let food;
let dx;
let dy;
let score;
let game;

// Initialize
function init(){

    snake = [{x:200,y:200}];

    food = randomFood();

    dx = grid;
    dy = 0;

    score = 0;

    document.getElementById("score").innerText = score;

    document.getElementById("gameover").style.display="none";
}

// Random food
function randomFood(){
    return{
        x: Math.floor(Math.random()*20)*grid,
        y: Math.floor(Math.random()*20)*grid
    }
}

// Draw grid background
function drawGrid(){

    ctx.strokeStyle="#222";

    for(let i=0;i<400;i+=grid){

        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,400);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(400,i);
        ctx.stroke();
    }
}

// Draw game
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,400,400);

    drawGrid();

    // Snake glow
    ctx.shadowBlur=15;
    ctx.shadowColor="lime";

    ctx.fillStyle="lime";

    snake.forEach(part=>{
        ctx.fillRect(part.x,part.y,grid,grid);
    });

    ctx.shadowBlur=0;

    // Food glow animation
    ctx.shadowBlur=20;
    ctx.shadowColor="red";

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,grid,grid);

    ctx.shadowBlur=0;

    let head={
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    // Eat food
    if(head.x==food.x && head.y==food.y){

        score++;
        document.getElementById("score").innerText=score;

        food=randomFood();

    }else{
        snake.pop();
    }

    // Collision
    if(head.x<0 || head.y<0 || head.x>=400 || head.y>=400 ||
        snake.some(p=>p.x==head.x && p.y==head.y)){

        clearInterval(game);

        document.getElementById("gameover").style.display="block";

        return;
    }

    snake.unshift(head);
}

// Controls
document.addEventListener("keydown", e=>{

    if(e.key=="ArrowUp" && dy==0){
        dx=0; dy=-grid;
    }

    if(e.key=="ArrowDown" && dy==0){
        dx=0; dy=grid;
    }

    if(e.key=="ArrowLeft" && dx==0){
        dx=-grid; dy=0;
    }

    if(e.key=="ArrowRight" && dx==0){
        dx=grid; dy=0;
    }

});

// Restart
function restart(){

    clearInterval(game);

    init();

    game=setInterval(draw,100);
}

// Start
init();

game=setInterval(draw,100);

</script>

</body>
</html>
